runtime:
  base_exp_dir: exp
  allow_online: false
  transformers_offline: false

training:
  test_size: 0.1
  seed: 42
  max_src_len: 128
  max_tgt_len: 128
  batch_size: 8
  num_epochs: 100
  lr: 2.0e-5
  weight_decay: 0.01
  report_to: tensorboard

inference:
  max_length: 128
  batch_size: 16
  num_beams: 4

gui:
  max_length: 128
  num_beams: 4

evaluation:
  strict: false